apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: argowf-chaos-sock-shop-sequential
  namespace: litmus
  labels:
    subject: "sock-shop-sequential"
spec:
  entrypoint: argowf-chaos
  serviceAccountName: argo-chaos
  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
  arguments:
    parameters:
      - name: adminModeNamespace
        value: "litmus"
      - name: appNamespace
        value: "sock-shop"
      # Agent installation configuration
      - name: agentFolder
        value: "flash-agent"
      - name: installTimeout
        value: "15m"
      # Flash Agent configuration
      - name: openaiApiKey
        value: ""
      - name: openaiModel
        value: "gpt-4o"
      - name: openaiBaseUrl
        value: "http://litellm.litellm.svc.cluster.local:4000/v1"
      - name: litellmUpstream
        value: "http://172.26.0.1:14000"
      - name: otelEndpoint
        value: ""
      - name: scanInterval
        value: "20"
      - name: logLines
        value: "100"
  templates:
    - name: argowf-chaos
      steps:
        - - name: install-application
            template: install-application
        - - name: install-agent
            template: install-agent
        - - name: install-chaos-faults
            template: install-chaos-faults
          - name: load-test
            template: load-test
        - - name: pod-cpu-hog
            template: pod-cpu-hog
        - - name: pod-network-loss
            template: pod-network-loss
        - - name: pod-memory-hog
            template: pod-memory-hog
        - - name: cleanup-chaos-resources
            template: cleanup-chaos-resources
          - name: delete-loadtest
            template: delete-loadtest

    - name: install-application
      container:
        image: agentcert/agentcert-install-app:latest
        imagePullPolicy: IfNotPresent
        args: ["-folder=sock-shop", "-namespace=sock-shop", "-create-namespace", "-wait", "-timeout=20m"]

    - name: install-agent
      container:
        image: agentcert/agentcert-install-agent:latest
        imagePullPolicy: Always
        args:
          - "-folder={{workflow.parameters.agentFolder}}"
          - "-namespace={{workflow.parameters.appNamespace}}"
          - "-create-namespace"
          - "-timeout={{workflow.parameters.installTimeout}}"
          - "--set=agent.secret.OPENAI_API_KEY={{workflow.parameters.openaiApiKey}}"
          - "--set=agent.config.MODEL_ALIAS={{workflow.parameters.openaiModel}}"
          - "--set=agent.config.OPENAI_BASE_URL={{workflow.parameters.openaiBaseUrl}}"
          - "--set=agent.config.SCAN_INTERVAL={{workflow.parameters.scanInterval}}"
          - "--set=agent.notifyId={{workflow.name}}"
          - "--set=agent.workflowUid={{workflow.uid}}"
          - "--set=sidecar.upstream={{workflow.parameters.litellmUpstream}}"

    - name: install-chaos-faults
      inputs:
        artifacts:
          - name: pod-cpu-hog-2sf
            path: /tmp/pod-cpu-hog-2sf.yaml
            raw:
              data: |
                apiVersion: litmuschaos.io/v1alpha1
                description:
                  message: |
                    Injects CPU consumption on pods belonging to an app deployment
                kind: ChaosExperiment
                metadata:
                  name: pod-cpu-hog
                  labels:
                    name: pod-cpu-hog
                    app.kubernetes.io/part-of: litmus
                    app.kubernetes.io/component: chaosexperiment
                    app.kubernetes.io/version: latest
                spec:
                  definition:
                    scope: Namespaced
                    permissions:
                      - apiGroups: [""]
                        resources: ["pods"]
                        verbs: ["create","delete","get","list","patch","update","deletecollection"]
                      - apiGroups: [""]
                        resources: ["events"]
                        verbs: ["create","get","list","patch","update"]
                      - apiGroups: [""]
                        resources: ["configmaps"]
                        verbs: ["get","list"]
                      - apiGroups: [""]
                        resources: ["pods/log"]
                        verbs: ["get","list","watch"]
                      - apiGroups: [""]
                        resources: ["pods/exec"]
                        verbs: ["get","list","create"]
                      - apiGroups: ["apps"]
                        resources: ["deployments","statefulsets","replicasets","daemonsets"]
                        verbs: ["list","get"]
                      - apiGroups: ["apps.openshift.io"]
                        resources: ["deploymentconfigs"]
                        verbs: ["list","get"]
                      - apiGroups: [""]
                        resources: ["replicationcontrollers"]
                        verbs: ["get","list"]
                      - apiGroups: ["argoproj.io"]
                        resources: ["rollouts"]
                        verbs: ["list","get"]
                      - apiGroups: ["batch"]
                        resources: ["jobs"]
                        verbs: ["create","list","get","delete","deletecollection"]
                      - apiGroups: ["litmuschaos.io"]
                        resources: ["chaosengines","chaosexperiments","chaosresults"]
                        verbs: ["create","list","get","patch","update","delete"]
                    image: "litmuschaos.docker.scarf.sh/litmuschaos/go-runner:latest"
                    imagePullPolicy: Always
                    args:
                      - -c
                      - ./experiments -name pod-cpu-hog
                    command:
                      - /bin/bash
                    env:
                      - name: TOTAL_CHAOS_DURATION
                        value: "60"
                      - name: CPU_CORES
                        value: "1"
                      - name: CPU_LOAD
                        value: "100"
                      - name: PODS_AFFECTED_PERC
                        value: ""
                      - name: RAMP_TIME
                        value: ""
                      - name: LIB_IMAGE
                        value: "litmuschaos.docker.scarf.sh/litmuschaos/go-runner:latest"
                      - name: STRESS_IMAGE
                        value: "alexeiled/stress-ng:latest-ubuntu"
                      - name: CONTAINER_RUNTIME
                        value: "containerd"
                      - name: SOCKET_PATH
                        value: "/run/containerd/containerd.sock"
                      - name: TARGET_CONTAINER
                        value: ""
                      - name: TARGET_PODS
                        value: ""
                      - name: DEFAULT_HEALTH_CHECK
                        value: "false"
                      - name: NODE_LABEL
                        value: ""
                      - name: SEQUENCE
                        value: "parallel"
                    labels:
                      name: pod-cpu-hog
                      app.kubernetes.io/part-of: litmus
                      app.kubernetes.io/component: experiment-job
                      app.kubernetes.io/runtime-api-usage: "true"
                      app.kubernetes.io/version: latest
          - name: pod-network-loss-nl1
            path: /tmp/pod-network-loss-nl1.yaml
            raw:
              data: |
                apiVersion: litmuschaos.io/v1alpha1
                description:
                  message: |
                    Injects network packet loss on pods belonging to an app deployment
                kind: ChaosExperiment
                metadata:
                  name: pod-network-loss
                  labels:
                    name: pod-network-loss
                    app.kubernetes.io/part-of: litmus
                    app.kubernetes.io/component: chaosexperiment
                    app.kubernetes.io/version: latest
                spec:
                  definition:
                    scope: Namespaced
                    permissions:
                      - apiGroups: [""]
                        resources: ["pods"]
                        verbs: ["create","delete","get","list","patch","update","deletecollection"]
                      - apiGroups: [""]
                        resources: ["events"]
                        verbs: ["create","get","list","patch","update"]
                      - apiGroups: [""]
                        resources: ["configmaps"]
                        verbs: ["get","list"]
                      - apiGroups: [""]
                        resources: ["pods/log"]
                        verbs: ["get","list","watch"]
                      - apiGroups: [""]
                        resources: ["pods/exec"]
                        verbs: ["get","list","create"]
                      - apiGroups: ["apps"]
                        resources: ["deployments","statefulsets","replicasets","daemonsets"]
                        verbs: ["list","get"]
                      - apiGroups: ["apps.openshift.io"]
                        resources: ["deploymentconfigs"]
                        verbs: ["list","get"]
                      - apiGroups: [""]
                        resources: ["replicationcontrollers"]
                        verbs: ["get","list"]
                      - apiGroups: ["argoproj.io"]
                        resources: ["rollouts"]
                        verbs: ["list","get"]
                      - apiGroups: ["batch"]
                        resources: ["jobs"]
                        verbs: ["create","list","get","delete","deletecollection"]
                      - apiGroups: ["litmuschaos.io"]
                        resources: ["chaosengines","chaosexperiments","chaosresults"]
                        verbs: ["create","list","get","patch","update","delete"]
                    image: "litmuschaos.docker.scarf.sh/litmuschaos/go-runner:latest"
                    imagePullPolicy: Always
                    args:
                      - -c
                      - ./experiments -name pod-network-loss
                    command:
                      - /bin/bash
                    env:
                      - name: TARGET_CONTAINER
                        value: ""
                      - name: LIB_IMAGE
                        value: "litmuschaos.docker.scarf.sh/litmuschaos/go-runner:latest"
                      - name: NETWORK_INTERFACE
                        value: "eth0"
                      - name: TC_IMAGE
                        value: "gaiadocker/iproute2"
                      - name: NETWORK_PACKET_LOSS_PERCENTAGE
                        value: "100"
                      - name: TOTAL_CHAOS_DURATION
                        value: "60"
                      - name: RAMP_TIME
                        value: ""
                      - name: PODS_AFFECTED_PERC
                        value: ""
                      - name: DEFAULT_HEALTH_CHECK
                        value: "false"
                      - name: TARGET_PODS
                        value: ""
                      - name: NODE_LABEL
                        value: ""
                      - name: CONTAINER_RUNTIME
                        value: "containerd"
                      - name: DESTINATION_IPS
                        value: ""
                      - name: DESTINATION_HOSTS
                        value: ""
                      - name: SOCKET_PATH
                        value: "/run/containerd/containerd.sock"
                      - name: SEQUENCE
                        value: "parallel"
                    labels:
                      name: pod-network-loss
                      app.kubernetes.io/part-of: litmus
                      app.kubernetes.io/component: experiment-job
                      app.kubernetes.io/runtime-api-usage: "true"
                      app.kubernetes.io/version: latest
          - name: pod-memory-hog-49a
            path: /tmp/pod-memory-hog-49a.yaml
            raw:
              data: |
                apiVersion: litmuschaos.io/v1alpha1
                description:
                  message: |
                    Injects memory consumption on pods belonging to an app deployment
                kind: ChaosExperiment
                metadata:
                  name: pod-memory-hog
                  labels:
                    name: pod-memory-hog
                    app.kubernetes.io/part-of: litmus
                    app.kubernetes.io/component: chaosexperiment
                    app.kubernetes.io/version: latest
                spec:
                  definition:
                    scope: Namespaced
                    permissions:
                      - apiGroups: [""]
                        resources: ["pods"]
                        verbs: ["create","delete","get","list","patch","update","deletecollection"]
                      - apiGroups: [""]
                        resources: ["events"]
                        verbs: ["create","get","list","patch","update"]
                      - apiGroups: [""]
                        resources: ["configmaps"]
                        verbs: ["get","list"]
                      - apiGroups: [""]
                        resources: ["pods/log"]
                        verbs: ["get","list","watch"]
                      - apiGroups: [""]
                        resources: ["pods/exec"]
                        verbs: ["get","list","create"]
                      - apiGroups: ["apps"]
                        resources: ["deployments","statefulsets","replicasets","daemonsets"]
                        verbs: ["list","get"]
                      - apiGroups: ["apps.openshift.io"]
                        resources: ["deploymentconfigs"]
                        verbs: ["list","get"]
                      - apiGroups: [""]
                        resources: ["replicationcontrollers"]
                        verbs: ["get","list"]
                      - apiGroups: ["argoproj.io"]
                        resources: ["rollouts"]
                        verbs: ["list","get"]
                      - apiGroups: ["batch"]
                        resources: ["jobs"]
                        verbs: ["create","list","get","delete","deletecollection"]
                      - apiGroups: ["litmuschaos.io"]
                        resources: ["chaosengines","chaosexperiments","chaosresults"]
                        verbs: ["create","list","get","patch","update","delete"]
                    image: "litmuschaos.docker.scarf.sh/litmuschaos/go-runner:latest"
                    imagePullPolicy: Always
                    args:
                      - -c
                      - ./experiments -name pod-memory-hog
                    command:
                      - /bin/bash
                    env:
                      - name: TOTAL_CHAOS_DURATION
                        value: "60"
                      - name: MEMORY_CONSUMPTION
                        value: "500"
                      - name: NUMBER_OF_WORKERS
                        value: "1"
                      - name: PODS_AFFECTED_PERC
                        value: ""
                      - name: RAMP_TIME
                        value: ""
                      - name: LIB_IMAGE
                        value: "litmuschaos.docker.scarf.sh/litmuschaos/go-runner:latest"
                      - name: STRESS_IMAGE
                        value: "alexeiled/stress-ng:latest-ubuntu"
                      - name: CONTAINER_RUNTIME
                        value: "containerd"
                      - name: SOCKET_PATH
                        value: "/run/containerd/containerd.sock"
                      - name: SEQUENCE
                        value: "parallel"
                      - name: DEFAULT_HEALTH_CHECK
                        value: "false"
                      - name: TARGET_CONTAINER
                        value: ""
                      - name: TARGET_PODS
                        value: ""
                      - name: NODE_LABEL
                        value: ""
                    labels:
                      name: pod-memory-hog
                      app.kubernetes.io/part-of: litmus
                      app.kubernetes.io/component: experiment-job
                      app.kubernetes.io/runtime-api-usage: "true"
                      app.kubernetes.io/version: latest
      outputs: {}
      metadata: {}
      container:
        name: ""
        image: litmuschaos/k8s:latest
        command:
          - sh
          - "-c"
        args:
          - kubectl apply -f /tmp/ -n {{workflow.parameters.adminModeNamespace}} && sleep 30
        resources: {}

    - name: pod-cpu-hog
      inputs:
        artifacts:
          - name: pod-cpu-hog
            path: /tmp/chaosengine.yaml
            raw:
              data: |
                apiVersion: litmuschaos.io/v1alpha1
                kind: ChaosEngine
                metadata:
                  name: pod-cpu-hog-chaos
                  namespace: "{{workflow.parameters.adminModeNamespace}}"
                  labels:
                    context: "{{workflow.parameters.appNamespace}}_carts"
                  annotations: {}
                spec:
                  appinfo:
                    appns: 'sock-shop'
                    applabel: 'name=carts'
                    appkind: 'deployment'
                  jobCleanUpPolicy: retain
                  engineState: 'active'
                  chaosServiceAccount: litmus-admin
                  experiments:
                    - name: pod-cpu-hog
                      spec:
                        probe:
                        - name: "check-frontend-access-url"
                          type: "httpProbe"
                          httpProbe/inputs:
                            url: "http://front-end.sock-shop.svc.cluster.local:80"
                            insecureSkipVerify: false
                            responseTimeout: 100
                            method:
                              get:
                                criteria: "=="
                                responseCode: "200"
                          mode: "Continuous"
                          runProperties:
                            probeTimeout: 5s
                            interval: 2s
                            attempt: 30
                            probePollingInterval: 5s
                        components:
                          env:
                            - name: CPU_CORES
                              value: '1'
                            - name: TOTAL_CHAOS_DURATION
                              value: '300'
                            - name: RAMP_TIME
                              value: '30'
                            - name: CHAOS_KILL_COMMAND
                              value: "kill -9 $(ps afx | grep \"[md5sum] /dev/zero\" | awk '{print$1}' | tr '\n' ' ')"
      container:
        image: litmuschaos/litmus-checker:latest
        args: ["-file=/tmp/chaosengine.yaml","-saveName=/tmp/engine-name"]

    - name: pod-network-loss
      inputs:
        artifacts:
          - name: pod-network-loss
            path: /tmp/chaosengine.yaml
            raw:
              data: |
                apiVersion: litmuschaos.io/v1alpha1
                kind: ChaosEngine
                metadata:
                  name: pod-network-loss-chaos
                  namespace: "{{workflow.parameters.adminModeNamespace}}"
                  labels:
                    context: "{{workflow.parameters.appNamespace}}_user-db"
                  annotations: {}
                spec:
                  appinfo:
                    appns: 'sock-shop'
                    applabel: 'name=user-db'
                    appkind: 'statefulset'
                  jobCleanUpPolicy: retain
                  engineState: 'active'
                  chaosServiceAccount: litmus-admin
                  components:
                    runner:
                      imagePullPolicy: Always
                  experiments:
                    - name: pod-network-loss
                      spec:
                        probe:
                        - name: "check-cards-access-url"
                          type: "httpProbe"
                          httpProbe/inputs:
                            url: "http://front-end.sock-shop.svc.cluster.local:80/cards"
                            insecureSkipVerify: false
                            responseTimeout: 100
                            method:
                              get:
                                criteria: "=="
                                responseCode: "200"
                          mode: "Continuous"
                          runProperties:
                            probeTimeout: 5s
                            interval: 2s
                            attempt: 30
                            probePollingInterval: 5s
                        components:
                          env:
                            - name: TOTAL_CHAOS_DURATION
                              value: '300'
                            - name: RAMP_TIME
                              value: '30'
                            - name: NETWORK_INTERFACE
                              value: 'eth0'
                            - name: NETWORK_PACKET_LOSS_PERCENTAGE
                              value: '100'
                            - name: CONTAINER_RUNTIME
                              value: 'containerd'
                            - name: SOCKET_PATH
                              value: '/run/containerd/containerd.sock'
      container:
        image: litmuschaos/litmus-checker:latest
        args: ["-file=/tmp/chaosengine.yaml","-saveName=/tmp/engine-name"]

    - name: pod-memory-hog
      inputs:
        artifacts:
          - name: pod-memory-hog
            path: /tmp/chaosengine.yaml
            raw:
              data: |
                apiVersion: litmuschaos.io/v1alpha1
                kind: ChaosEngine
                metadata:
                  name: pod-memory-hog-chaos
                  namespace: "{{workflow.parameters.adminModeNamespace}}"
                  labels:
                    context: "{{workflow.parameters.appNamespace}}_orders"
                  annotations: {}
                spec:
                  appinfo:
                    appns: 'sock-shop'
                    applabel: 'name=orders'
                    appkind: 'deployment'
                  jobCleanUpPolicy: retain
                  engineState: 'active'
                  chaosServiceAccount: litmus-admin
                  experiments:
                    - name: pod-memory-hog
                      spec:
                        probe:
                        - name: "check-frontend-access-url"
                          type: "httpProbe"
                          httpProbe/inputs:
                            url: "http://front-end.sock-shop.svc.cluster.local:80"
                            insecureSkipVerify: false
                            responseTimeout: 100
                            method:
                              get:
                                criteria: "=="
                                responseCode: "200"
                          mode: "Continuous"
                          runProperties:
                            probeTimeout: 5s
                            interval: 2s
                            attempt: 30
                            probePollingInterval: 5s
                        components:
                          env:
                            - name: MEMORY_CONSUMPTION
                              value: '500'
                            - name: TOTAL_CHAOS_DURATION
                              value: '300'
                            - name: RAMP_TIME
                              value: '30'
                            - name: CHAOS_KILL_COMMAND
                              value: "kill -9 $(ps afx | grep \"[dd] if /dev/zero\" | awk '{print $1}' | tr '\n' ' ')"
      container:
        image: litmuschaos/litmus-checker:latest
        args: ["-file=/tmp/chaosengine.yaml","-saveName=/tmp/engine-name"]

    - name: load-test
      container:
        image: litmuschaos/litmus-app-deployer:latest
        args: ["-namespace=loadtest", "-app=loadtest"]

    - name: delete-loadtest
      container:
        image: litmuschaos/litmus-app-deployer:latest
        args: ["-namespace=loadtest","-operation=delete", "-app=loadtest"]

    - name: cleanup-chaos-resources
      container:
        image: litmuschaos/k8s:latest
        command: [sh, -c]
        args:
          [
            "kubectl delete chaosengine pod-cpu-hog-chaos pod-network-loss-chaos pod-memory-hog-chaos -n {{workflow.parameters.adminModeNamespace}}",
          ]
